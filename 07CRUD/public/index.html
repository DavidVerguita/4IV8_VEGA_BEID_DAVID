<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio Gótico - Gestión de Usuarios (CRUD)</title>
    <link rel="stylesheet" href="./css/crud.css">
</head>
<body>
    <div class="container-main">
        <header>
            <h1>Sistemas de Gestión Oscura</h1>
        </header>
        
        <div id="notificacion" class="notificacion" style="display: none;"></div>

        <main class="crud-layout">
            <section class="formulario-section">  
                <h2 id="form-titulo">Agregar Nuevo Usuario</h2>
                <form id="form-usuario" autocomplete="off">
                    <input type="hidden" id="id-usuario">
                    
                    <div class="campo">
                        <label for="nombre">Nombre Completo</label>
                        <input type="text" id="nombre" placeholder="Escribe tu nombre..." maxlength="60" required>
                        <span id="error-nombre" class="error"></span>
                    </div>

                    <div class="campo">
                        <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                        <input type="date" id="fecha_nacimiento" required>
                        <span id="error-fecha" class="error"></span>
                    </div>

                    <div class="campo">
                        <label for="nota">Nota de Registro (0-10)</label>
                        <input type="number" id="nota" placeholder="Ej. 8.5" min="0" max="10" step="0.1" required>
                        <span id="error-nota" class="error"></span>
                    </div>

                    <div class="botones-container">
                        <button type="submit" id="btn-guardar">Guardar Destino</button>
                        <button type="button" id="btn-cancelar" class="btn-secundario" style="display: none;">Cancelar</button>
                    </div>
                </form>    
            </section>

            <section class="table-section">
                <h2>Registros de Almas Guardadas</h2>
                <p id="mensaje-carga">Invocando datos del servidor...</p>
                <p id="mensaje-vacio" style="display: none;">No hay usuarios registrados en la base de datos.</p>
                
                <table id="tabla-usuarios" style="display: none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre Completo</th>
                            <th>Fecha de Nacimiento</th>
                            <th>Nota</th>
                            <th>Acciones del Sistema</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-usuarios">
                        </tbody>
                </table>
            </section>
        </main>

        <div class="container-footer">
            <footer>
                <a href=".../index.html" class="btn-back">Regresar a Página Principal</a>
            </footer>
        </div>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
